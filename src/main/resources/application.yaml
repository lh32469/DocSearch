spring:
  application:
    name: DocSearch
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{25}.%M - %msg%n"
  level:
    net:
      ravendb:
        client:
          documents:
            session:
              operations: WARN
    org:
      gpc4j:
        docs:
          services: INFO
          controller: INFO
          tasks: INFO

server:
  port: 8085

management:
  server:
    port: 8090
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# RavenDB Configuration
ravendb:
  database: DocSearch
#  urls: injected from Jenkins Global properties RAVENDB_URLS

# PageRefreshTask schedule
page-refresh:
  fixed-rate: 60

